<style>
    .report-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
    }
    .report-toolbar button {
        border: none;
        border-radius: 0.75rem;
        padding: 0.55rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
    }
    .report-toolbar button.btn-report-print {
        background: #0d6efd;
        color: #ffffff;
    }
    .report-toolbar button.btn-report-download {
        background: #6c757d;
        color: #ffffff;
    }
    .report-toolbar button:hover {
        filter: brightness(0.95);
    }
    .no-print {
        display: flex;
    }
    @media print {
        .no-print {
            display: none !important;
        }
    }
</style>
<div class="report-toolbar no-print">
    <button type="button" class="btn-report-print" onclick="window.print()">Imprimir</button>
    <button type="button" class="btn-report-download" onclick="window.print()">Descargar PDF</button>
</div>
