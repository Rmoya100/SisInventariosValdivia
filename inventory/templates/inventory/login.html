{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Control Inventarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'inventory/css/style.css' %}?v=3.0">
    <style>
        .login-bg {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 70%, #4f46e5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card-premium {
            background: rgba(255,255,255,0.97);
            border-radius: 1.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
            width: 100%;
            max-width: 430px;
            overflow: hidden;
            animation: fadeSlideIn 0.6s ease-out;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
            color: white;
        }
        .login-logo {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
        }
        .login-body {
            padding: 2rem 2.5rem 2.5rem;
        }
        .form-control-premium {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem 0.75rem 3rem;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s;
        }
        .form-control-premium:focus {
            background: white;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.12);
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
    </style>
</head>
<body class="login-bg">
    <div class="login-card-premium">
        <div class="login-card-header">
            <div class="login-logo">
                <i class="fa-solid fa-boxes-stacked fs-2"></i>
            </div>
            <h3 class="fw-bold mb-1">Inventario Pro</h3>
            <p class="mb-0 opacity-75 small">Control de Inventarios y Activos</p>
        </div>
        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show rounded-3 border-0 shadow-sm mb-4" role="alert">
                        <i class="fa-solid fa-circle-xmark me-2"></i>{{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <p class="text-muted mb-4 text-center">Ingresa tus credenciales para acceder</p>
            
            <form method="POST" id="login-form">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small">USUARIO</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" name="nombreUsu" id="id_nombreUsu" class="form-control form-control-premium" required autofocus placeholder="Ej. admin">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small">CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" name="password" id="id_password" class="form-control form-control-premium" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mt-1 fw-bold rounded-pill">
                    <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Iniciar Sesión
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'inventory/js/session.js' %}"></script>
</body>
</html>
