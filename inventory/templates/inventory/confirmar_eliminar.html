{% extends 'inventory/base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body p-5 text-center">
                <div class="confirm-delete-icon">
                    <i class="fa-solid fa-trash-can"></i>
                </div>
                <h5 class="fw-bold mb-2">{{ titulo }}</h5>
                <p class="text-muted mb-4" style="font-size:0.9rem;">¿Seguro que deseas eliminar <strong class="text-gray-700">"{{ objeto }}"</strong>?<br>Esta acción no se puede deshacer.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{{ url_volver }}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                        <button type="submit" class="btn btn-danger rounded-pill px-4 fw-semibold">Eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
