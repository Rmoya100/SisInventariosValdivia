{% extends 'inventory/base.html' %}
{% load inventory_extras %}
{% block title %}Reporte de Gastos{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'gastos' %}" class="btn btn-light shadow-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" title="Volver"><i class="fa-solid fa-arrow-left"></i></a>
        <div>
            <h2 class="fw-bold text-primary mb-0">Reporte de Gastos</h2>
            <p class="text-muted mb-0">Filtra y genera el reporte en PDF o Excel</p>
        </div>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <form method="get" id="form-filtros">

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Proyecto</label>
                        <select name="proyecto" class="form-select">
                            <option value="">Todos los proyectos</option>
                            {% for p in proyectos %}
                            <option value="{{ p.pk }}" {% if proyecto_id == p.pk|stringformat:"s" %}selected{% endif %}>{{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Concepto</label>
                        <select name="concepto" class="form-select">
                            <option value="">Todos los conceptos</option>
                            {% for value, label in conceptos %}
                            <option value="{{ value }}" {% if concepto == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label class="form-label fw-semibold text-secondary">Fecha desde</label>
                            <input type="date" name="fecha_desde" value="{{ fecha_desde }}" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold text-secondary">Fecha hasta</label>
                            <input type="date" name="fecha_hasta" value="{{ fecha_hasta }}" class="form-control">
                        </div>
                    </div>

                    <hr class="my-4 text-muted">

                    <div class="d-flex gap-3 justify-content-end">
                        <button type="button" id="btn-excel"
                                class="btn btn-outline-success rounded-pill px-4 fw-bold d-flex align-items-center gap-2">
                            <i class="fa-solid fa-file-excel"></i> Exportar Excel
                        </button>
                        <button type="button" id="btn-pdf"
                                class="btn btn-danger rounded-pill px-4 fw-bold d-flex align-items-center gap-2">
                            <i class="fa-solid fa-file-pdf"></i> Generar PDF
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var form    = document.getElementById('form-filtros');
    var btnPdf  = document.getElementById('btn-pdf');
    var btnExcel = document.getElementById('btn-excel');

    function buildParams() {
        return new URLSearchParams(new FormData(form)).toString();
    }

    btnPdf.addEventListener('click', function () {
        window.open('{% url "reporte_gastos_pdf" %}?' + buildParams(), '_blank');
    });

    btnExcel.addEventListener('click', function () {
        window.location = '{% url "exportar_gastos_excel" %}?' + buildParams();
    });
})();
</script>

{% endblock %}
